<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AEG – Menu aplikacji</title>
  <link rel="stylesheet" href="aeg-theme.css">
</head>

<body>

<div class="app">
  <div class="layout" style="
    grid-template-columns: 1fr;
    justify-items: center;
    align-items: center;
    height: 100vh;
  ">

    <div class="main" style="width: 100%; display: flex; justify-content: center;">

      <!-- GŁÓWNY CONTAINER -->
      <div class="container-card" style="width: 1400px;">

        <h1 class="text-center">AEG – Menu aplikacji</h1>

        <!-- ===== SEKCJE ===== -->
        <div class="grid grid-3 mt-20">

          <!-- SEKCJA 1 -->
          <div class="container-card">
            <h3>Narzędzia klienta</h3>
            <div class="divider"></div>

            <a href="email-tool.html" target="_blank">
              <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">
                Email Buchstabieren
              </button>
            </a>

            <a href="product-finder.html" target="_blank">
              <button class="btn btn-outline" style="width: 100%; margin-bottom: 10px;">
                Produkt Finder
              </button>
            </a>

            <a href="order-check.html" target="_blank">
              <button class="btn btn-secondary" style="width: 100%;">
                Status zamówienia
              </button>
            </a>
          </div>

          <!-- SEKCJA 2 -->
          <div class="container-card">
            <h3>System</h3>
            <div class="divider"></div>

            <a href="database.html" target="_blank">
              <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">
                Baza danych
              </button>
            </a>

            <a href="reports.html" target="_blank">
              <button class="btn btn-outline" style="width: 100%; margin-bottom: 10px;">
                Raporty
              </button>
            </a>

            <a href="logs.html" target="_blank">
              <button class="btn btn-secondary" style="width: 100%;">
                Logi systemowe
              </button>
            </a>
          </div>

          <!-- SEKCJA 3 -->
          <div class="container-card">
            <h3>Ustawienia</h3>
            <div class="divider"></div>

            <a href="profile.html" target="_blank">
              <button class="btn btn-primary" style="width: 100%; margin-bottom: 10px;">
                Profil
              </button>
            </a>

            <a href="preferences.html" target="_blank">
              <button class="btn btn-outline" style="width: 100%; margin-bottom: 10px;">
                Preferencje
              </button>
            </a>

            <a href="help.html" target="_blank">
              <button class="btn btn-secondary" style="width: 100%;">
                Pomoc
              </button>
            </a>
          </div>

        </div>

        <!-- ===== SZYBKIE AKCJE ===== -->
        <div class="container-card mt-20">

          <h2>Szybkie akcje</h2>

          <div class="grid grid-2 mt-20">

            <a href="new-ticket.html" target="_blank">
              <div class="container-dark text-center">
                <h3>Nowe zgłoszenie</h3>
              </div>
            </a>

            <a href="contact.html" target="_blank">
              <div class="container-dark text-center">
                <h3>Kontakt</h3>
              </div>
            </a>

          </div>

        </div>

      </div>

    </div>
  </div>
</div>

</body>
</html>
